<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFlow - Professional Clock Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo">⏰</div>
                <h1>TimeFlow</h1>
            </div>
            <p class="subtitle">Professional Time Management</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="grid-layout">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <!-- Digital Time Panel -->
                <div class="glass-panel">
                    <div class="panel-header">Digital Time</div>
                    <div class="digital-time">
                        <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
                    </div>
                    <div class="ampm" id="ampm">AM</div>
                </div>

                <!-- Date & Timezone Panel -->
                <div class="glass-panel">
                    <div class="panel-header">Date & Timezone</div>
                    <div class="info-group">
                        <div class="info-label">Date</div>
                        <div class="info-value" id="dateDisplay">Jan 1</div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Timezone</div>
                        <div class="info-value">IST</div>
                    </div>
                </div>

                <!-- Status Panel -->
                <div class="glass-panel">
                    <div class="panel-header">Status</div>
                    <div class="status-indicator">
                        <div class="pulse-dot"></div>
                        <span>Active & Running</span>
                    </div>
                </div>
            </aside>

            <!-- Main Clock Area -->
            <section class="clock-section">
                <div class="glass-panel-large">
                    <!-- Analog Clock -->
                    <svg class="analog-clock" viewBox="0 0 350 350" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="clockGradient" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.95)" />
                                <stop offset="100%" stop-color="rgba(255, 255, 255, 0.7)" />
                            </radialGradient>
                        </defs>

                        <!-- Clock face -->
                        <circle cx="175" cy="175" r="170" fill="url(#clockGradient)" stroke="rgba(0,0,0,0.08)" stroke-width="1" />

                        <!-- Hour marks -->
                        <g id="hourMarks"></g>

                        <!-- Hour numbers -->
                        <g id="hourNumbers"></g>

                        <!-- Hour hand -->
                        <line id="hour" x1="175" y1="175" x2="175" y2="95" stroke="rgba(0,0,0,0.8)" stroke-width="5" stroke-linecap="round" />

                        <!-- Minute hand -->
                        <line id="minute" x1="175" y1="175" x2="175" y2="55" stroke="rgba(0,0,0,0.6)" stroke-width="4" stroke-linecap="round" />

                        <!-- Second hand -->
                        <line id="second" x1="175" y1="175" x2="175" y2="50" stroke="rgb(59, 130, 246)" stroke-width="2" stroke-linecap="round" />

                        <!-- Center dot -->
                        <circle cx="175" cy="175" r="6" fill="rgba(0,0,0,0.8)" />
                    </svg>

                    <div class="clock-help">
                        Press <kbd>H</kbd> to toggle settings
                    </div>
                </div>
            </section>
        </div>

        <!-- Bottom Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statHours">00</div>
                <div class="stat-label">Hours</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMinutes">00</div>
                <div class="stat-label">Minutes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSeconds">00</div>
                <div class="stat-label">Seconds</div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="clock.js"></script>
</body>
</html>
